<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>마술 영상 분석기 🃏🪙</title>
<style>
  :root { --bg:#0f1115; --card:#1a1d24; --line:#2b2f3a; --txt:#e6e8ee;
          --mut:#9aa3b2; --accent:#e23b3b; --ok:#3bbf6a; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt);
         font-family:"Segoe UI",system-ui,sans-serif; line-height:1.5; }
  .wrap { max-width:920px; margin:0 auto; padding:24px 16px 64px; }
  h1 { font-size:1.6rem; margin:.2em 0; }
  .mut { color:var(--mut); font-size:.9rem; }
  .card { background:var(--card); border:1px solid var(--line);
          border-radius:12px; padding:18px; margin:16px 0; }
  label { display:block; font-size:.85rem; color:var(--mut); margin:10px 0 4px; }
  input[type=text], input[type=file] { width:100%; padding:10px;
          background:#0d0f14; border:1px solid var(--line); border-radius:8px;
          color:var(--txt); }
  .row { display:flex; gap:18px; flex-wrap:wrap; align-items:center; }
  .row > div { flex:1; min-width:220px; }
  .opts { display:flex; gap:20px; flex-wrap:wrap; margin-top:8px; }
  .opts label { display:flex; align-items:center; gap:6px; color:var(--txt);
                margin:0; cursor:pointer; }
  button { background:var(--accent); color:#fff; border:0; border-radius:8px;
           padding:12px 22px; font-size:1rem; cursor:pointer; margin-top:14px; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  .seg { border:1px solid var(--line); border-radius:10px; padding:12px 14px;
         margin:10px 0; background:#13161d; }
  .seg .head { display:flex; justify-content:space-between; font-weight:600; }
  .badges { margin:6px 0; }
  .badge { display:inline-block; font-size:.72rem; padding:2px 8px; border-radius:99px;
           background:#2a1414; color:#ff9c9c; border:1px solid #4a2020; margin:2px 4px 2px 0; }
  .infer { margin-top:8px; padding:10px; background:#101820; border-left:3px solid var(--ok);
           border-radius:6px; font-size:.92rem; }
  .gallery { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:10px; }
  .gallery figure { margin:0; }
  .gallery img { width:100%; border-radius:8px; border:1px solid var(--line); }
  .gallery figcaption { font-size:.75rem; color:var(--mut); text-align:center; margin-top:4px; }
  video { width:100%; border-radius:10px; border:1px solid var(--line); }
  #status { display:none; }
  .spin { display:inline-block; width:16px; height:16px; border:3px solid var(--line);
          border-top-color:var(--accent); border-radius:50%; animation:s 1s linear infinite;
          vertical-align:middle; margin-right:8px; }
  @keyframes s { to { transform:rotate(360deg); } }
  pre.log { background:#0a0c10; padding:10px; border-radius:8px; max-height:160px;
            overflow:auto; font-size:.78rem; color:var(--mut); white-space:pre-wrap; }
  .warn { font-size:.82rem; color:var(--mut); border-left:3px solid var(--accent);
          padding-left:10px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🃏🪙 마술 영상 분석기</h1>
  <p class="warn">손을 추적해 <b>'수상한 순간'</b>(팜·전달·급동작·주먹쥠)을 타임라인으로 짚어줍니다.
     비밀을 확정하는 게 아니라 통계적으로 의심스러운 구간을 보조적으로 찾아줍니다.</p>

  <div class="card">
    <form id="form">
      <label>YouTube URL</label>
      <input type="text" name="url" id="url" placeholder="https://youtu.be/...">
      <label>또는 영상 파일 업로드 (mp4/mov)</label>
      <input type="file" name="file" id="file" accept="video/*">
      <div class="row" style="margin-top:8px">
        <div>
          <label>마술 종류 (중복 선택 가능, 자동이면 영상 보고 판별)</label>
          <div class="opts">
            <label><input type="checkbox" name="mode" value="auto" id="m_auto"> 🔮 자동 감지</label>
            <label><input type="checkbox" name="mode" value="card" checked> 🃏 카드</label>
            <label><input type="checkbox" name="mode" value="coin"> 🪙 동전</label>
          </div>
        </div>
        <div>
          <label>옵션</label>
          <div class="opts">
            <label><input type="checkbox" name="annotate" id="annotate" checked> 마킹 영상</label>
            <label><input type="checkbox" name="llm" id="llm"> AI 설명(OpenAI)</label>
          </div>
        </div>
      </div>
      <button type="submit" id="go">분석 시작</button>
    </form>
  </div>

  <div class="card" id="status">
    <div><span class="spin"></span><b id="statusText">분석 중…</b></div>
    <p class="mut">긴 영상은 손 추적에 수십 초~수 분 걸립니다. 창을 닫지 마세요.</p>
    <pre class="log" id="log"></pre>
  </div>

  <div id="results"></div>
</div>

<script>
const form = document.getElementById('form');
const statusBox = document.getElementById('status');
const statusText = document.getElementById('statusText');
const logEl = document.getElementById('log');
const resultsEl = document.getElementById('results');
const goBtn = document.getElementById('go');
let timer = null;

function fmt(t){ t=Number(t)||0; const m=Math.floor(t/60), s=(t%60); return String(m).padStart(2,'0')+':'+s.toFixed(2).padStart(5,'0'); }
// LLM/기법 문자열은 innerHTML로 들어가므로 반드시 이스케이프(< 포함 시 잘림/주입 방지)
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function safeUrl(u){ return (typeof u==='string' && /^https?:\/\//i.test(u)) ? u : ''; }
function num(x){ return Number.isFinite(Number(x)) ? Number(x) : 0; }

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  if (!form.querySelector('input[name="mode"]:checked')) {
    alert('마술 종류를 하나 이상 선택하세요 (카드/동전).');
    return;
  }
  resultsEl.innerHTML = '';
  goBtn.disabled = true;
  statusBox.style.display = 'block';
  const spin = statusBox.querySelector('.spin');
  if (spin) spin.style.display = '';   // 새 시작 시 스피너 복원
  statusText.textContent = '업로드/시작 중…';
  logEl.textContent = '';
  try {
    const res = await fetch('/analyze', { method:'POST', body:new FormData(form) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '시작 실패');
    poll(data.job_id);
  } catch (err) {
    statusText.textContent = '오류: ' + err.message;
    goBtn.disabled = false;
  }
});

function poll(jobId){
  statusText.textContent = '분석 중…';
  const modeKo = (m) => m === 'coin' ? '🪙 동전' : (m === 'auto' ? '🔮 자동 판별' : '🃏 카드');
  timer = setInterval(async () => {
    const r = await fetch('/status/' + jobId);
    const d = await r.json();
    if (d.log) logEl.textContent = d.log;
    if (d.status === 'running') {
      statusText.textContent = `분석 중… ${modeKo(d.mode)}${d.progress ? ' ('+d.progress+')' : ''}`;
      return;
    }
    clearInterval(timer);
    goBtn.disabled = false;
    if (d.status === 'failed') {
      const sp = statusBox.querySelector('.spin'); if (sp) sp.style.display = 'none';
      statusText.textContent = '분석 실패 (아래 로그 확인)';
      return;
    }
    statusBox.style.display = 'none';
    render(jobId, d);
  }, 2500);
}

function modeLabel(m, auto){ const b = m === 'coin' ? '🪙 동전 분석' : '🃏 카드 분석'; return auto ? b + ' (🔮 자동 판별)' : b; }

// 한 모드의 결과 묶음을 HTML로 렌더링. 파일 URL은 /jobs/<id>/<seg>/ 아래에서 가져온다.
// seg는 폴더명(auto일 수 있음), mode는 판별된 실제 종류(card/coin).
function renderMode(jobId, r){
  const rep = r.report || {};
  const segs = rep.segments || [];
  const base = `/jobs/${jobId}/${r.seg || r.mode}`;
  const isAuto = (r.seg === 'auto');
  let html = `<div class="card" style="border-left:3px solid var(--accent)">
    <h2 style="margin:0">${modeLabel(r.mode, isAuto)} <span class="mut" style="font-size:.9rem">· 의심 ${segs.length}개 · 길이 ${fmt(rep.duration_sec||0)}</span></h2></div>`;

  if (r.summary) {
    html += `<div class="card"><h3>🤖 전체 트릭 추정 (에이전트)</h3>
      <div class="infer" style="white-space:pre-wrap">${esc(r.summary)}</div></div>`;
  }

  if (r.techniques && r.techniques.length) {
    html += `<div class="card"><h3>🎓 사용된 기법 설명</h3>`;
    r.techniques.forEach(t => {
      const url = safeUrl(t.reference_url);
      const en = t.name_en ? ` ${esc(t.name_en)}` : '';
      html += `<div class="seg">
        <div class="head"><span>${esc(t.name_ko)} <span class="mut">${en}${t.type?' · '+esc(t.type):''}</span></span></div>
        <div style="margin:6px 0">${esc(t.desc)}</div>
        ${t.cues ? `<div class="mut" style="font-size:.85rem">관찰 단서: ${esc(t.cues)}</div>` : ''}
        ${url ? `<a href="${esc(url)}" target="_blank" rel="noopener"
           style="display:inline-block;margin-top:8px;color:#7db4ff">▶ 참고 튜토리얼 영상 보기</a>` : ''}
      </div>`;
    });
    html += `</div>`;
  }

  if (r.matches && r.matches.length) {
    html += `<div class="card"><h3>🔍 라이브러리 매칭 (데이터 기반 유사도)</h3>
      <p class="mut" style="margin-top:0">의심 순간의 손 궤적을 기법 예시 라이브러리와 비교한 결과(0~1).</p>`;
    r.matches.forEach(m => {
      html += `<div class="seg"><div class="head"><span>${fmt(m.time_sec)}</span></div>`;
      (m.results||[]).forEach(rr => {
        const sim = num(rr.similarity);
        const pct = Math.max(0, Math.min(100, Math.round(sim*100)));
        html += `<div style="display:flex;align-items:center;gap:8px;margin:4px 0">
          <span style="width:130px">${esc(rr.name_ko)}</span>
          <span style="flex:1;background:#0d0f14;border-radius:6px;overflow:hidden;height:14px">
            <span style="display:block;height:100%;width:${pct}%;background:var(--ok)"></span></span>
          <span class="mut" style="width:48px;text-align:right">${sim.toFixed(2)}</span>
        </div>`;
      });
      html += `</div>`;
    });
    html += `</div>`;
  }

  if (r.video) {
    html += `<div class="card"><h3>마킹 영상</h3>
      <video controls src="${base}/annotated.webm"></video></div>`;
  }

  html += `<div class="card"><h3>의심 구간 타임라인</h3>`;
  if (!segs.length) html += `<p class="mut">의심 구간을 찾지 못했습니다.</p>`;
  segs.forEach((s, i) => {
    const badges = (s.top_signals||[]).map(x => `<span class="badge">${esc(x)}</span>`).join('');
    const score = (s.score==null) ? '-' : num(s.score).toFixed(2);
    html += `<div class="seg">
      <div class="head"><span>[${i+1}] ${fmt(s.start_sec)} ~ ${fmt(s.end_sec)}</span>
        <span class="mut">정점 ${fmt(s.peak_sec)} · 점수 ${score}</span></div>
      <div class="badges">${badges}</div>
      ${s.inference ? `<div class="infer">🤖 ${esc(s.inference)}</div>` : ''}
    </div>`;
  });
  html += `</div>`;

  if (r.frames && r.frames.length) {
    html += `<div class="card"><h3>의심 프레임</h3><div class="gallery">`;
    r.frames.forEach(f => {
      const m = f.match(/_([\d.]+)s\.jpg$/);
      html += `<figure><img src="${base}/${f}">
        <figcaption>${m ? fmt(parseFloat(m[1])) : f}</figcaption></figure>`;
    });
    html += `</div></div>`;
  }
  return html;
}

function render(jobId, d){
  const results = d.results || [];
  if (!results.length) { resultsEl.innerHTML = `<div class="card"><p class="mut">결과가 없습니다.</p></div>`; return; }
  resultsEl.innerHTML = results.map(r => renderMode(jobId, r)).join('');
}
</script>
</body>
</html>
