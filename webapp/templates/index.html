<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>마술 영상 분석기 🃏🪙</title>
<style>
  :root { --bg:#0f1115; --card:#1a1d24; --line:#2b2f3a; --txt:#e6e8ee;
          --mut:#9aa3b2; --accent:#e23b3b; --ok:#3bbf6a; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt);
         font-family:"Segoe UI",system-ui,sans-serif; line-height:1.5; }
  .wrap { max-width:920px; margin:0 auto; padding:24px 16px 64px; }
  h1 { font-size:1.6rem; margin:.2em 0; }
  .mut { color:var(--mut); font-size:.9rem; }
  .card { background:var(--card); border:1px solid var(--line);
          border-radius:12px; padding:18px; margin:16px 0; }
  label { display:block; font-size:.85rem; color:var(--mut); margin:10px 0 4px; }
  input[type=text], input[type=file] { width:100%; padding:10px;
          background:#0d0f14; border:1px solid var(--line); border-radius:8px;
          color:var(--txt); }
  .row { display:flex; gap:18px; flex-wrap:wrap; align-items:center; }
  .row > div { flex:1; min-width:220px; }
  .opts { display:flex; gap:20px; flex-wrap:wrap; margin-top:8px; }
  .opts label { display:flex; align-items:center; gap:6px; color:var(--txt);
                margin:0; cursor:pointer; }
  button { background:var(--accent); color:#fff; border:0; border-radius:8px;
           padding:12px 22px; font-size:1rem; cursor:pointer; margin-top:14px; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  .seg { border:1px solid var(--line); border-radius:10px; padding:12px 14px;
         margin:10px 0; background:#13161d; }
  .seg .head { display:flex; justify-content:space-between; font-weight:600; }
  .badges { margin:6px 0; }
  .badge { display:inline-block; font-size:.72rem; padding:2px 8px; border-radius:99px;
           background:#2a1414; color:#ff9c9c; border:1px solid #4a2020; margin:2px 4px 2px 0; }
  .infer { margin-top:8px; padding:10px; background:#101820; border-left:3px solid var(--ok);
           border-radius:6px; font-size:.92rem; }
  .gallery { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:10px; }
  .gallery figure { margin:0; }
  .gallery img { width:100%; border-radius:8px; border:1px solid var(--line); }
  .gallery figcaption { font-size:.75rem; color:var(--mut); text-align:center; margin-top:4px; }
  video { width:100%; border-radius:10px; border:1px solid var(--line); }
  #status { display:none; }
  .spin { display:inline-block; width:16px; height:16px; border:3px solid var(--line);
          border-top-color:var(--accent); border-radius:50%; animation:s 1s linear infinite;
          vertical-align:middle; margin-right:8px; }
  @keyframes s { to { transform:rotate(360deg); } }
  pre.log { background:#0a0c10; padding:10px; border-radius:8px; max-height:160px;
            overflow:auto; font-size:.78rem; color:var(--mut); white-space:pre-wrap; }
  .warn { font-size:.82rem; color:var(--mut); border-left:3px solid var(--accent);
          padding-left:10px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🃏🪙 마술 영상 분석기</h1>
  <p class="warn">손을 추적해 <b>'수상한 순간'</b>(팜·전달·급동작·주먹쥠)을 타임라인으로 짚어줍니다.
     비밀을 확정하는 게 아니라 통계적으로 의심스러운 구간을 보조적으로 찾아줍니다.</p>

  <div class="card">
    <form id="form">
      <label>YouTube URL</label>
      <input type="text" name="url" id="url" placeholder="https://youtu.be/...">
      <label>또는 영상 파일 업로드 (mp4/mov)</label>
      <input type="file" name="file" id="file" accept="video/*">
      <div class="row" style="margin-top:8px">
        <div>
          <label>마술 종류</label>
          <div class="opts">
            <label><input type="radio" name="mode" value="card" checked> 카드</label>
            <label><input type="radio" name="mode" value="coin"> 동전</label>
          </div>
        </div>
        <div>
          <label>옵션</label>
          <div class="opts">
            <label><input type="checkbox" name="annotate" id="annotate" checked> 마킹 영상</label>
            <label><input type="checkbox" name="llm" id="llm"> AI 설명(OpenAI)</label>
          </div>
        </div>
      </div>
      <button type="submit" id="go">분석 시작</button>
    </form>
  </div>

  <div class="card" id="status">
    <div><span class="spin"></span><b id="statusText">분석 중…</b></div>
    <p class="mut">긴 영상은 손 추적에 수십 초~수 분 걸립니다. 창을 닫지 마세요.</p>
    <pre class="log" id="log"></pre>
  </div>

  <div id="results"></div>
</div>

<script>
const form = document.getElementById('form');
const statusBox = document.getElementById('status');
const statusText = document.getElementById('statusText');
const logEl = document.getElementById('log');
const resultsEl = document.getElementById('results');
const goBtn = document.getElementById('go');
let timer = null;

function fmt(t){ const m=Math.floor(t/60), s=(t%60); return String(m).padStart(2,'0')+':'+s.toFixed(2).padStart(5,'0'); }

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  resultsEl.innerHTML = '';
  goBtn.disabled = true;
  statusBox.style.display = 'block';
  statusText.textContent = '업로드/시작 중…';
  logEl.textContent = '';
  try {
    const res = await fetch('/analyze', { method:'POST', body:new FormData(form) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '시작 실패');
    poll(data.job_id);
  } catch (err) {
    statusText.textContent = '오류: ' + err.message;
    goBtn.disabled = false;
  }
});

function poll(jobId){
  statusText.textContent = '분석 중…';
  timer = setInterval(async () => {
    const r = await fetch('/status/' + jobId);
    const d = await r.json();
    if (d.log) logEl.textContent = d.log;
    if (d.status === 'running') return;
    clearInterval(timer);
    goBtn.disabled = false;
    if (d.status === 'failed') { statusText.textContent = '분석 실패 (로그 확인)'; return; }
    statusBox.style.display = 'none';
    render(jobId, d);
  }, 2500);
}

function render(jobId, d){
  const rep = d.report || {};
  const segs = rep.segments || [];
  let html = `<div class="card"><h2 style="margin-top:0">결과 (${rep.mode||''} · 의심 ${segs.length}개 · 길이 ${fmt(rep.duration_sec||0)})</h2></div>`;

  if (d.summary) {
    html += `<div class="card"><h3>🤖 전체 트릭 추정 (에이전트)</h3>
      <div class="infer">${d.summary}</div></div>`;
  }

  if (d.video) {
    html += `<div class="card"><h3>마킹 영상</h3>
      <video controls src="/jobs/${jobId}/annotated.mp4"></video></div>`;
  }

  html += `<div class="card"><h3>의심 구간 타임라인</h3>`;
  if (!segs.length) html += `<p class="mut">의심 구간을 찾지 못했습니다.</p>`;
  segs.forEach((s, i) => {
    const badges = (s.top_signals||[]).map(x => `<span class="badge">${x}</span>`).join('');
    html += `<div class="seg">
      <div class="head"><span>[${i+1}] ${fmt(s.start_sec)} ~ ${fmt(s.end_sec)}</span>
        <span class="mut">정점 ${fmt(s.peak_sec)} · 점수 ${s.score}</span></div>
      <div class="badges">${badges}</div>
      ${s.inference ? `<div class="infer">🤖 ${s.inference}</div>` : ''}
    </div>`;
  });
  html += `</div>`;

  if (d.frames && d.frames.length) {
    html += `<div class="card"><h3>의심 프레임</h3><div class="gallery">`;
    d.frames.forEach(f => {
      const m = f.match(/_([\d.]+)s\.jpg$/);
      html += `<figure><img src="/jobs/${jobId}/${f}">
        <figcaption>${m ? fmt(parseFloat(m[1])) : f}</figcaption></figure>`;
    });
    html += `</div></div>`;
  }
  resultsEl.innerHTML = html;
}
</script>
</body>
</html>
